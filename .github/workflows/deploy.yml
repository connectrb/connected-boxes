name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [master, main] # Covers both possibilities

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # This addresses the specific warning you are seeing
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # Crucial for Hugo Book
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        # -v (verbose) will show us the EXACT error if it fails again
        run: hugo --minify -v 

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public